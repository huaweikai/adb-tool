name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-flight runs for the same ref when a new commit lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  go-backend:
    name: Go (vet + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          check-latest: true

      - name: go vet
        run: go vet ./...

      - name: go test
        run: go test ./... -count=1

  flutter-analyze-test:
    name: Flutter (analyze + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: flutter_app
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Show toolchain
        run: |
          flutter --version
          dart --version

      - name: pub get
        run: flutter pub get

      # Re-generate drift's *.g.dart from the table definitions. The checked-in
      # copies are kept so contributors don't need to run this locally, but CI
      # must verify they're in sync with the .dart sources.
      - name: build_runner build (drift)
        run: dart run build_runner build --delete-conflicting-outputs

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

  i18n-keys:
    name: i18n key parity (zh / en)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Check tr() keys are present in every locale
        run: python scripts/check_i18n_tr_keys.py