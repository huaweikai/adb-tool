name: Build Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          check-latest: true

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install WiX Toolset
        run: |
          dotnet tool install --global wix --version 5.0.2
          echo "$env:USERPROFILE\.dotnet\tools" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Add WiX UI extension
        run: wix extension add WixToolset.UI.wixext/5.0.2

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build Windows MSI (amd64 + arm64)
        run: |
          $version = "${{ github.ref_name }}"
          $version = $version.TrimStart('v')
          .\scripts\build.ps1 -Mode Release -GoArch all -ProductVersion $version

      - uses: actions/upload-artifact@v4
        with:
          name: adb-tool-windows
          path: dist/windows/*.msi

  build-macos-arm64:
    # Apple Silicon runner,原生 arm64,不碰 Rosetta,codesign/xcodebuild 都稳
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          check-latest: true

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Go backend (disabled; build.sh handles it)
        run: echo "Go backend built by scripts/build.sh --arch arm64"

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build macOS .app (arm64)
        run: bash scripts/build.sh --platform macos --mode release --arch arm64

      - uses: actions/upload-artifact@v4
        with:
          name: adb-tool-macos-arm64
          path: dist/macos/*.dmg

  build-macos-amd64:
    # Intel x86_64 runner,原生 amd64 —— 这是打 amd64 包唯一稳的路
    # (M 系列 runner 走 Rosetta 跑 codesign 会挂,跟本机 M2 一样)
    runs-on: macos-13
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          check-latest: true

      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Build Go backend (disabled; build.sh handles it)
        run: echo "Go backend built by scripts/build.sh --arch amd64"

      - name: Flutter pub get
        working-directory: flutter_app
        run: flutter pub get

      - name: Build macOS .app (amd64)
        run: bash scripts/build.sh --platform macos --mode release --arch amd64

      - uses: actions/upload-artifact@v4
        with:
          name: adb-tool-macos-amd64
          path: dist/macos/*.dmg

  create-release:
    needs: [build-windows, build-macos-arm64, build-macos-amd64]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            adb-tool-windows/*.msi
            adb-tool-macos-arm64/*.dmg
            adb-tool-macos-amd64/*.dmg
          generate_release_notes: true