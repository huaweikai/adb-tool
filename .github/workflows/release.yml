name: Build & Release

on:
  push:
    tags:
      - "v*"

jobs:

  android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Android helper (optional)
        run: |
          if [ -d adb_tool_app ]; then
            cd adb_tool_app
            ./gradlew assembleRelease || true
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: adb_tool_app/app/build/outputs/apk/**/release/*.apk

  macos-arm64:
    runs-on: macos-14
    needs: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          check-latest: true
          cache-dependency-path: backend/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Read version from pubspec
        id: ver
        run: |
          VERSION=$(grep '^version:' flutter_app/pubspec.yaml | awk '{print $2}' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Build macOS
        env:
          PRODUCT_VERSION: ${{ steps.ver.outputs.version }}
        run: PRODUCT_VERSION="$PRODUCT_VERSION" bash scripts/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: dist/macos/*.dmg

  macos-amd64:
    # Intel x86_64 runner — macos-13 was retired 2025-12, GitHub's current
    # Intel option is macos-15-intel (expected available until 2027-08).
    # build.sh runs native x86_64 build on this host, no Rosetta needed.
    runs-on: macos-15-intel
    needs: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          check-latest: true
          cache-dependency-path: backend/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Read version from pubspec
        id: ver
        run: |
          VERSION=$(grep '^version:' flutter_app/pubspec.yaml | awk '{print $2}' | sed 's/+.*//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Using version: $VERSION"

      - name: Build macOS
        env:
          PRODUCT_VERSION: ${{ steps.ver.outputs.version }}
        run: PRODUCT_VERSION="$PRODUCT_VERSION" bash scripts/build.sh

      - uses: actions/upload-artifact@v4
        with:
          name: macos-amd64
          path: dist/macos/*.dmg

  windows:
    runs-on: windows-latest
    needs: android
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          check-latest: true
          cache-dependency-path: backend/go.sum

      - uses: subosito/flutter-action@v2

      - name: Install WiX v5
        run: |
          dotnet tool update --global wix --version 5.0.2 2>$null
          dotnet tool install --global wix --version 5.0.2 2>$null
          wix --version

      - name: Read version from pubspec
        id: ver
        shell: pwsh
        run: |
          $v = (Select-String -Path flutter_app/pubspec.yaml -Pattern '^version:' | ForEach-Object { ($_.Line -split '\s+')[1] }) -replace '\+.*$',''
          "version=$v" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Using version: $v"

      - name: Build Windows
        env:
          PRODUCT_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          powershell -ExecutionPolicy Bypass -File scripts/build.ps1 -Mode Release -ProductVersion "$env:PRODUCT_VERSION"

      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: dist/windows/*.msi

  release:
    runs-on: ubuntu-latest
    needs: [macos-arm64, macos-amd64, windows]

    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            macos-arm64/**/*.dmg
            macos-amd64/**/*.dmg
            windows/**/*.msi