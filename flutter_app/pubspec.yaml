name: adb_tool
description: ADB Log Viewer with real-time filtering
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.0
  file_selector: ^1.0.0
  cross_file: ^0.3.0
  dio: ^5.9.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  flutter_staggered_grid_view: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
