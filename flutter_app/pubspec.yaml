name: adb_tool
description: ADB Log Viewer with real-time filtering
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  web_socket_channel: ^3.0.0
  file_selector: ^1.0.0
  cross_file: ^0.3.0
  dio: ^5.9.2
  provider: ^6.1.2
  get_it: ^8.0.3
  shared_preferences: ^2.3.2
  drift: ^2.22.1
  sqlite3_flutter_libs: ^0.5.28
  path_provider: ^2.1.5
  path: ^1.9.1
  archive: ^3.6.1
  flutter_staggered_grid_view: ^0.7.0
  video_player: ^2.9.2
  pro_image_editor: ^9.2.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  drift_dev: ^2.22.1
  build_runner: ^2.4.13

# drift_dev 2.34.x has a parser bug in column.dart where the legacy
# `text()()` column syntax trips an internal AST cast when paired with
# analyzer 12.x (the version pulled in by current flutter). Pinning
# analyzer to ^10.0.0 keeps the older AST shape and lets the legacy
# syntax parse cleanly. Drop this override once drift_dev publishes a
# fix (or migrate column definitions to the drift3Preview syntax and
# drop this override along with the build_runner entries above).
dependency_overrides:
  # (see history) — keep this block even if empty so the next person
  # knows where to look when analyzer/drift_dev/dart_style versions
  # drift again.
  analyzer: ^13.0.0
  dart_style: ^3.1.9

flutter:
  uses-material-design: true
