<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024" role="img" aria-labelledby="title desc">
  <title id="title">ADB Tool Icon</title>
  <desc id="desc">A simple ADB label icon for a testing and debugging tool.</desc>
  <defs>
    <linearGradient id="bg" x1="128" y1="96" x2="896" y2="928" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1F2937"/>
      <stop offset="1" stop-color="#090F1A"/>
    </linearGradient>
    <linearGradient id="mark" x1="276" y1="312" x2="748" y2="716" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#D7E1EF"/>
    </linearGradient>
  </defs>

  <rect x="96" y="96" width="832" height="832" rx="188" fill="url(#bg)"/>
  <rect x="96" y="96" width="832" height="832" rx="188" fill="none" stroke="#FFFFFF" stroke-width="20" opacity="0.08"/>

  <text x="512" y="548" fill="url(#mark)" font-family="Arial, Helvetica, sans-serif" font-size="208" font-weight="800" letter-spacing="-6" text-anchor="middle">ADB</text>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M328 654H696" stroke="#FFFFFF" stroke-width="34" opacity="0.86"/>
    <path d="M328 654H476" stroke="#35E0A1" stroke-width="34"/>
  </g>

  <text x="512" y="742" fill="#94A3B8" font-family="Arial, Helvetica, sans-serif" font-size="54" font-weight="700" letter-spacing="10" text-anchor="middle">DEBUG</text>
</svg>
